<!DOCTYPE html>
<html>
<head>
    <title>Interactive Access</title>
    <style>
        body { background: #121212; color: #00ff00; font-family: 'Courier New', monospace; padding: 50px; }
        #terminal { border: 1px solid #333; padding: 20px; max-width: 600px; margin: auto; }
        input { background: none; border: none; color: #00ff00; font-family: inherit; font-size: 1.1em; outline: none; width: 80%; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="terminal">
    <div id="output">Establishing secure connection...<br>Enter password to access the browser:</div>
    <br>
    <span>> </span><input type="text" id="userInput" autofocus>
</div>

<div id="secretBrowser" class="hidden" style="text-align:center;">
    <h1>Access Granted</h1>
    <p>Welcome to our private portal.</p>
    <iframe src="https://www.wikipedia.org" width="100%" height="500px"></iframe>
</div>

<script>
    const input = document.getElementById('userInput');
    const output = document.getElementById('output');
    const terminal = document.getElementById('terminal');
    const secret = document.getElementById('secretBrowser');

    // Change 'chess' to whatever answer you want
    const correctAnswer = "chess"; 

    input.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            const val = input.value.toLowerCase().trim();
            
            if (val === correctAnswer) {
                terminal.classList.add('hidden');
                secret.classList.remove('hidden');
            } else {
                output.innerHTML += `<br><span style="color:red;">Access Denied. Incorrect answer.</span>`;
                input.value = '';
            }
        }
    });
</script>

</body>
</html>
