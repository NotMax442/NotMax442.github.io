<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL_ACCESS_V1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="terminal" class="glitch">
        <div class="system-msg">[SYSTEM] TERMINAL INITIALIZED...</div>
        <div class="system-msg">[SYSTEM] AWAITING UPLINK PARAMETERS.</div>
    </div>

    <div id="input-area">
        <input type="password" id="token" placeholder="GITHUB_API_TOKEN">
        <input type="text" id="gistId" placeholder="GIST_ID">
        <input type="text" id="roomCode" placeholder="PORTAL_CODE" onchange="checkRoom()">
        <input type="text" id="message" placeholder="ENTER_MESSAGE..." style="flex-grow: 1;">
        <button onclick="transmit()">TRANSMIT</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
