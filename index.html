<!DOCTYPE html>
<html>
<head>
    <title>Ghost Network</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="vault">
        <h2>Ghost Network</h2>
        <input type="text" id="key" placeholder="Secret Keyword (The 'Lock')">
        <textarea id="input" placeholder="Message to hide or reveal..."></textarea>
        
        <div class="btns">
            <button onclick="run(true)">Scramble</button>
            <button onclick="run(false)">Unscramble</button>
        </div>

        <textarea id="output" readonly placeholder="Result..."></textarea>
    </div>
    <script src="script.js"></script>
</body>
</html>
