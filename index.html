<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AES-256 Secure Vault</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>AES-256 Encryption</h2>
        
        <label>Input Message / Encrypted Code:</label>
        <textarea id="message" placeholder="Type text to encrypt OR paste code to decrypt..."></textarea>
        
        <label>Secret Password:</label>
        <input type="password" id="password" placeholder="Enter strong password">
        
        <div class="controls">
            <button class="encrypt-btn" onclick="handleEncrypt()">Encrypt</button>
            <button class="decrypt-btn" onclick="handleDecrypt()">Decrypt</button>
        </div>

        <label>Result:</label>
        <textarea id="output" readonly placeholder="Result will appear here..."></textarea>
        <button class="copy-btn" onclick="copyResult()">Copy to Clipboard</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
