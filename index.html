<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ghost Vault</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>GHOST<span>VAULT</span></h1>
            <p>Your Private Language</p>
        </header>

        <div class="field">
            <label>The Secret Key</label>
            <input type="text" id="key" placeholder="Enter secret word...">
        </div>

        <div class="field">
            <label>Message or Code</label>
            <textarea id="input" placeholder="Type here..."></textarea>
        </div>
        
        <div class="actions">
            <button class="btn-scramble" onclick="process(true)">Scramble</button>
            <button class="btn-reveal" onclick="process(false)">Reveal</button>
        </div>

        <div class="field">
            <label>Result</label>
            <textarea id="output" readonly placeholder="Result..."></textarea>
            <button class="btn-copy" onclick="copyText()">Copy Result</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
