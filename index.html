<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SECURE_UPLINK_v2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="status-bar">>> SYNC_TIMER: <span id="timer">30</span>s | STATUS: <span id="status">ONLINE</span></div>
    
    <div id="terminal">
        <div class="system-msg">[SYSTEM] CONNECTING TO PORTAL...</div>
    </div>

    <canvas id="paintCanvas" width="800" height="400"></canvas>

    <div id="input-area">
        <input type="text" id="username" placeholder="USER_ID">
        <input type="text" id="message" placeholder="ENTER_TRANSMISSION..." style="flex-grow: 1;">
        <button onclick="transmit()">TRANSMIT</button>
        <button onclick="clearCanvas()" style="background: #f00;">WIPE_DATA</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
